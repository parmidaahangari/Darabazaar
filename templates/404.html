<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - صفحه یافت نشد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'Vazirmatn';
            src: url('/static/css/fonts/Vazirmatn/webfonts/Vazirmatn-Regular.woff2') format('woff2'),
                 url('/static/css/fonts/Vazirmatn/webfonts/Vazirmatn-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Vazirmatn', sans-serif;
            background-color: #0b0d2a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: bgRotate 20s linear infinite;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── FLOATING PARTICLES ── */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ── MAIN CONTAINER ── */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            position: relative;
        }

        /* ── ERROR PANEL ── */
        .error-panel {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.2) 100%);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                0 0 100px rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: panelPulse 4s ease-in-out infinite;
        }

        @keyframes panelPulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.07), 0 0 100px rgba(99, 102, 241, 0.1); }
            50% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.07), 0 0 120px rgba(139, 92, 246, 0.2); }
        }

        .error-panel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(99, 102, 241, 0.3), transparent);
            z-index: -1;
            animation: borderRotate 3s linear infinite;
            opacity: 0.5;
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── GLITCH 404 ── */
        .glitch-container {
            position: relative;
            margin-bottom: 30px;
        }

        .glitch {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            position: relative;
            color: #fff;
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            animation: glitchSkew 3s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            color: #ff00ff;
            animation: glitchEffect1 2s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            transform: translate(-2px, -2px);
        }

        .glitch::after {
            color: #00ffff;
            animation: glitchEffect2 2s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            transform: translate(2px, 2px);
        }

        @keyframes glitchEffect1 {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-5px, 0); }
            94% { transform: translate(5px, 0); }
            96% { transform: translate(-2px, 0); }
        }

        @keyframes glitchEffect2 {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(5px, 0); }
            93% { transform: translate(-5px, 0); }
            95% { transform: translate(2px, 0); }
        }

        @keyframes glitchSkew {
            0%, 90%, 100% { transform: skew(0deg); }
            92% { transform: skew(-2deg); }
            94% { transform: skew(2deg); }
        }

        /* ── GAME ICON ── */
        .game-icon {
            font-size: 64px;
            background: linear-gradient(135deg, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s ease infinite;
            filter: drop-shadow(0 0 20px rgba(167, 139, 250, 0.5));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ── TEXT CONTENT ── */
        .error-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.95);
        }

        .error-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── BUTTONS ── */
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: #fff;
            color: #0b0d2a;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
            background: #f0f0f0;
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-2px);
        }

        /* ── FLOATING GAME ELEMENTS ── */
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            opacity: 0.1;
            font-size: 24px;
            animation: floatAround 20s infinite linear;
        }

        .floating-item:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-item:nth-child(2) { top: 20%; right: 10%; animation-delay: -5s; }
        .floating-item:nth-child(3) { top: 60%; left: 5%; animation-delay: -10s; }
        .floating-item:nth-child(4) { bottom: 20%; right: 15%; animation-delay: -15s; }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -20px) rotate(90deg); }
            50% { transform: translate(-10px, -40px) rotate(180deg); }
            75% { transform: translate(20px, -20px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* ── CRT SCANLINE EFFECT ── */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.3;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .glitch {
                font-size: 80px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-panel {
                padding: 40px 24px;
            }
            
            .game-icon {
                font-size: 48px;
            }
        }

        @media (max-width: 480px) {
            .glitch {
                font-size: 60px;
            }
            
            .error-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-animation"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="scanlines"></div>

    <!-- Main Content -->
    <main>
        <div class="error-panel">
            <div class="floating-elements">
                <i class="fas fa-gamepad floating-item"></i>
                <i class="fas fa-ghost floating-item"></i>
                <i class="fas fa-bolt floating-item"></i>
                <i class="fas fa-star floating-item"></i>
            </div>

            <div class="glitch-container">
                <div class="glitch">404</div>
            </div>

            <i class="fas fa-dungeon game-icon"></i>

            <h1 class="error-title">گیم اور! صفحه پیدا نشد</h1>
            
            <p class="error-text">
                به نظر می‌رسه این مرحله هنوز unlock نشده یا شاید به منطقه ممنوعه وارد شدی! 
                لطفاً برگرد به نقطه امن.
            </p>

            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    بازگشت به خانه
                </a>
                <button onclick="window.history.back()" class="btn btn-secondary">
                    <i class="fas fa-undo"></i>
                    برگشت به عقب
                </button>
            </div>
        </div>
    </main>
</body>
</html>
