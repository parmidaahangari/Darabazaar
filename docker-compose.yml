services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  web:
    build:
      context: .
      network: host
      extra_hosts:
        - "deb.debian.org:194.33.42.142"          # آی‌پی میرور ایرانی برای دور زدن فیلتر دبیان
        - "debian.map.fastlydns.net:194.33.42.142"
    entrypoint: /app/entrypoint.prod.sh
    command: gunicorn FirstGame.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - .:/app
      - web_static:/app/staticfiles
      - web_media:/app/media
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=FirstGame.settings.production
    expose:
      - "8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: .
      network: host
      extra_hosts:
        - "deb.debian.org:194.33.42.142"
        - "debian.map.fastlydns.net:194.33.42.142"
    command: celery -A FirstGame worker -l info
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=FirstGame.settings.production
    depends_on:
      - db
      - redis
      - web

  celery_beat:
    build:
      context: .
      network: host
      extra_hosts:
        - "deb.debian.org:194.33.42.142"
        - "debian.map.fastlydns.net:194.33.42.142"
    command: celery -A FirstGame beat -l info --scheduler django_celery_beat.schedulers.DatabaseScheduler
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=FirstGame.settings.production
    depends_on:
      - db
      - redis
      - web

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - web_static:/app/staticfiles
      - web_media:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  web_static:
  web_media:
